<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>xveco</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 40px;
      margin: 10px 0;
    }

    p {
      max-width: 600px;
      margin: 20px auto;
      font-size: 18px;
      color: #cccccc;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #1f6feb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a:hover {
      background: #388bfd;
    }

    .install-box {
      margin-top: 30px;
    }

    .install-text {
      color: #aaaaaa;
      margin-bottom: 10px;
    }

    .code {
      background: #1a1a1a;
      padding: 12px 16px;
      border-radius: 8px;
      display: inline-block;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    .code:hover {
      background: #2a2a2a;
    }

    #msg {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
      height: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">🪙</div>

    <!-- TITULO -->
    <h1>xveco</h1>

    <!-- DESCRIPCIÓN -->
    <p>
      Librería de economía simulada en Python.
      Permite crear monedas, cuentas, transferencias,
      inflación y sistemas bancarios simples.
    </p>

    <p>
      Ideal para juegos, simulaciones y aprendizaje de economía básica.
    </p>

    <!-- LINKS -->
    <a href="https://github.com/santiagoandrespaco131-svg/xveco" target="_blank">
      GitHub
    </a>

    <a href="https://pypi.org/project/xveco/" target="_blank">
      PyPI
    </a>

    <!-- INSTALL -->
    <div class="install-box">

      <p class="install-text">Instala la librería:</p>

      <div class="code" onclick="copyInstall()">
        pip install xveco
      </div>

      <p id="msg"></p>

    </div>

  </div>

  <script>
    function copyInstall() {
      const text = "pip install xveco";

      navigator.clipboard.writeText(text).then(() => {
        document.getElementById("msg").innerText = "Copiado al portapapeles";

        setTimeout(() => {
          document.getElementById("msg").innerText = "";
        }, 1500);
      });
    }
  </script>

</body>
</html>
